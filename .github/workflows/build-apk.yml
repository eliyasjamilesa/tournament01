
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Prepare Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject Firebase Configuration
        run: |
          if [ -f "google-services.json" ]; then
            mkdir -p android/app
            cp google-services.json android/app/google-services.json
            echo "google-services.json found and moved to android/app/"
          else
            echo "google-services.json not found in root. Push-notifications might not work correctly."
          fi

      - name: Generate Android Assets (Icons & Splash)
        run: |
          if [ -d "assets" ]; then
            npm run assets:generate
          else
            echo "Assets folder not found. Using default icons."
          fi

      - name: Sync Capacitor
        run: npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ts-tour-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
